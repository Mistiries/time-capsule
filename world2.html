<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Time Capsule</title>
<style>
body {
  margin: 0;
  padding: 0;
  background: black;
  font-family: sans-serif;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url('images/darkwood.jpg') no-repeat center center fixed;
  background-size: cover;
  opacity: 0;
  transition: opacity 3s ease-in;
  z-index: -1;
}

body.loaded::before {
  opacity: 1;
}

#container {
  opacity: 0;
  transition: opacity 3s ease-in;
  position: relative;
  width: 100%;
  height: 100vh;
}

#container.visible {
  opacity: 1;
}

#burgerMenu {
  position: fixed;
  top: 50%;
  left: 0;
  transform: translateY(-50%);
  width: 36px;
  height: 36px;
  background: white;
  border-radius: 5px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 3010;
}

#burgerMenuContent {
  position: fixed;
  top: 50%;
  left: -220px;
  transform: translateY(-50%);
  width: 200px;
  background: rgba(255,255,255,0.95);
  transition: left 0.3s ease;
  display: flex;
  flex-direction: column;
  padding: 20px;
  box-sizing: border-box;
  z-index: 3009;
  border-radius: 10px;
  box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
}

#burgerMenuContent.open {
  left: 10px;
}

#burgerMenuContent button {
  margin: 10px 0;
  padding: 8px;
  cursor: pointer;
  background: white;
  border: none;
  box-shadow: 0 0 5px rgba(0,0,0,0.3);
  font-size: 16px;
  transition: transform 0.1s ease;
  border-radius: 5px;
}

#burgerMenuContent button:active {
  transform: scale(0.95);
}

#muteBtn {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 2002;
  padding: 8px 12px;
  background: rgba(255,255,255,0.85);
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
  box-shadow: 2px 2px 6px rgba(0,0,0,0.5);
}

#cupboard {
  position: fixed;
  bottom: -2%;
  left: 3%;
  width: 180px;
  cursor: pointer;
  z-index: 400;
  transition: transform 0.1s ease;
}

#cupboard:active {
  transform: scale(0.97);
}

#galleryOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.45);
  z-index: 2500;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

#galleryOverlay.active {
  opacity: 1;
  pointer-events: auto;
}

#galleryTab {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.95);
  width: 65vw;
  min-width: 300px;
  min-height: 200px;
  max-height: 70vh;
  background: white;
  border-radius: 12px;
  box-shadow: 4px 4px 20px rgba(0,0,0,0.5);
  z-index: 2600;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease, transform 0.25s ease;
  overflow: hidden;
}

#galleryTab.visible {
  opacity: 1;
  pointer-events: auto;
  transform: translate(-50%, -50%) scale(1);
}

#galleryTab.closing {
  opacity: 0;
  transform: translate(-50%, -50%) scale(0.9);
}

#galleryHeader {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  border-bottom: 1px solid #eee;
  cursor: grab;
  user-select: none;
  border-radius: 12px 12px 0 0;
  background: white;
  flex-shrink: 0;
}

#galleryHeader:active {
  cursor: grabbing;
}

#galleryTitle {
  font-size: 16px;
  font-weight: 500;
  color: #333;
}

#galleryClose {
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  color: #666;
  padding: 2px 6px;
  border-radius: 4px;
  transition: background 0.15s ease, transform 0.1s ease;
  box-shadow: none;
  margin: 0;
}

#galleryClose:hover {
  background: #f0f0f0;
}

#galleryClose:active {
  transform: scale(0.9);
}

#galleryContent {
  overflow-y: auto;
  padding: 20px;
  flex: 1;
  border-radius: 0 0 12px 12px;
  min-height: 0;
}

#galleryResizeHandle {
  position: absolute;
  bottom: 0;
  right: 0;
  width: 24px;
  height: 24px;
  cursor: nwse-resize;
  z-index: 10;
  display: flex;
  align-items: flex-end;
  justify-content: flex-end;
  padding: 4px;
  color: #bbb;
  font-size: 14px;
  user-select: none;
}
</style>
</head>
<body>

<div id="container">
  <audio id="background" src="sounds/background.mp3" loop></audio>
  <audio id="background2" src="sounds/background2.mp3" loop></audio>
  <audio id="background3" src="sounds/background3.mp3" loop></audio>
  <audio id="pickup" src="sounds/pickup.mp3"></audio>
  <audio id="creakSound" src="sounds/doorcreak.mp3"></audio>

  <button id="muteBtn">Mute Music</button>

  <div id="burgerMenu">☰</div>
  <div id="burgerMenuContent">
    <div id="musicControls" style="display:flex;justify-content:center;gap:10px;">
      <button id="prevTrack">⏮</button>
      <button id="nextTrack">⏭</button>
    </div>
    <button id="portalBackBtn">🪵</button>
  </div>

  <img src="images/cupboard.png" id="cupboard">

  <div id="galleryOverlay"></div>
  <div id="galleryTab">
    <div id="galleryHeader">
      <span id="galleryTitle">Gallery</span>
      <button id="galleryClose">✕</button>
    </div>
    <div id="galleryContent">
      <!-- images will go here later -->
    </div>
    <div id="galleryResizeHandle">⇲</div>
  </div>

</div>

<script>
const pickupSound = document.getElementById('pickup');
const muteBtn = document.getElementById('muteBtn');
const burgerMenu = document.getElementById('burgerMenu');
const burgerContent = document.getElementById('burgerMenuContent');
const container = document.getElementById('container');
const cupboard = document.getElementById('cupboard');
const creakSound = document.getElementById('creakSound');
const galleryTab = document.getElementById('galleryTab');
const galleryOverlay = document.getElementById('galleryOverlay');
const galleryClose = document.getElementById('galleryClose');
const galleryHeader = document.getElementById('galleryHeader');
const galleryResizeHandle = document.getElementById('galleryResizeHandle');

const musicTracks = [
  document.getElementById('background'),
  document.getElementById('background2'),
  document.getElementById('background3')
];
let currentTrack = 0;
let musicStarted = false;
musicTracks.forEach(track => { track.volume = 0.6; });
creakSound.volume = 0.6;

function startMusic() {
  if (!musicStarted) {
    musicTracks[currentTrack].play().then(() => {
      musicStarted = true;
    }).catch(err => {
      console.log('Autoplay blocked, waiting for interaction');
    });
  }
}

function fadeOutInTrack(direction) {
  let current = musicTracks[currentTrack];
  let nextIndex = (currentTrack + direction + musicTracks.length) % musicTracks.length;
  let next = musicTracks[nextIndex];
  let fadeOut = setInterval(() => {
    if (current.volume > 0.05) {
      current.volume -= 0.05;
    } else {
      clearInterval(fadeOut);
      current.pause();
      current.currentTime = 0;
      next.volume = 0;
      next.play();
      fadeIn(next);
      currentTrack = nextIndex;
    }
  }, 50);
}

function fadeIn(track) {
  let fi = setInterval(() => {
    if (track.volume < 0.6) {
      track.volume += 0.05;
    } else {
      clearInterval(fi);
    }
  }, 50);
}

document.getElementById('nextTrack').addEventListener('click', (e) => {
  e.stopPropagation();
  startMusic();
  pickupSound.currentTime = 0;
  pickupSound.play();
  fadeOutInTrack(1);
});

document.getElementById('prevTrack').addEventListener('click', (e) => {
  e.stopPropagation();
  startMusic();
  pickupSound.currentTime = 0;
  pickupSound.play();
  fadeOutInTrack(-1);
});

muteBtn.addEventListener('click', () => {
  startMusic();
  pickupSound.currentTime = 0;
  pickupSound.play();
  musicTracks.forEach(track => track.muted = !track.muted);
  muteBtn.textContent = musicTracks[0].muted ? 'Unmute Music' : 'Mute Music';
});

burgerMenu.addEventListener('click', (e) => {
  e.stopPropagation();
  startMusic();
  pickupSound.currentTime = 0;
  pickupSound.play();
  burgerContent.classList.toggle('open');
});

burgerContent.addEventListener('click', (e) => {
  e.stopPropagation();
});

document.addEventListener('click', (e) => {
  if (!burgerMenu.contains(e.target) && !burgerContent.contains(e.target)) {
    burgerContent.classList.remove('open');
  }
});

document.getElementById('portalBackBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  startMusic();
  pickupSound.currentTime = 0;
  pickupSound.play();
  burgerContent.classList.remove('open');
  window.location.href = 'capsule.html';
});

cupboard.addEventListener('click', () => {
  startMusic();
  creakSound.currentTime = 0;
  creakSound.play();
  galleryTab.classList.add('visible');
  galleryOverlay.classList.add('active');
});

galleryClose.addEventListener('click', (e) => {
  e.stopPropagation();
  pickupSound.currentTime = 0;
  pickupSound.play();
  galleryTab.classList.add('closing');
  galleryOverlay.classList.remove('active');
  setTimeout(() => {
    galleryTab.classList.remove('visible');
    galleryTab.classList.remove('closing');
    galleryTab.style.transition = 'opacity 0.25s ease, transform 0.25s ease';
    galleryTab.style.top = '50%';
    galleryTab.style.left = '50%';
    galleryTab.style.transform = 'translate(-50%, -50%) scale(0.95)';
    galleryTab.style.width = '65vw';
    galleryTab.style.height = '';
  }, 250);
});

galleryOverlay.addEventListener('click', () => {
  galleryClose.click();
});

// Dragging
let dragOffsetX, dragOffsetY, isDraggingGallery = false;

function startGalleryDrag(clientX, clientY) {
  isDraggingGallery = true;
  const rect = galleryTab.getBoundingClientRect();
  dragOffsetX = clientX - rect.left;
  dragOffsetY = clientY - rect.top;
  galleryTab.style.transition = 'none';
  galleryTab.style.transform = 'none';
  galleryTab.style.top = rect.top + 'px';
  galleryTab.style.left = rect.left + 'px';
}

function moveGallery(clientX, clientY) {
  if (!isDraggingGallery) return;
  galleryTab.style.top = (clientY - dragOffsetY) + 'px';
  galleryTab.style.left = (clientX - dragOffsetX) + 'px';
}

function endGalleryDrag() {
  isDraggingGallery = false;
  if (!galleryTab.classList.contains('closing')) {
    galleryTab.style.transition = 'opacity 0.25s ease, transform 0.25s ease';
  }
}

galleryHeader.addEventListener('mousedown', (e) => {
  if (e.target === galleryClose) return;
  startGalleryDrag(e.clientX, e.clientY);
  e.preventDefault();
});

galleryHeader.addEventListener('touchstart', (e) => {
  if (e.target === galleryClose) return;
  const touch = e.touches[0];
  startGalleryDrag(touch.clientX, touch.clientY);
  e.preventDefault();
}, { passive: false });

document.addEventListener('mousemove', (e) => {
  moveGallery(e.clientX, e.clientY);
});

document.addEventListener('touchmove', (e) => {
  if (!isDraggingGallery) return;
  const touch = e.touches[0];
  moveGallery(touch.clientX, touch.clientY);
  e.preventDefault();
}, { passive: false });

document.addEventListener('mouseup', endGalleryDrag);
document.addEventListener('touchend', endGalleryDrag);

// Resizing
let isResizing = false;
let resizeStartX, resizeStartY, resizeStartW, resizeStartH;

function startResize(clientX, clientY) {
  isResizing = true;
  const rect = galleryTab.getBoundingClientRect();
  resizeStartX = clientX;
  resizeStartY = clientY;
  resizeStartW = rect.width;
  resizeStartH = rect.height;
  galleryTab.style.transition = 'none';
}

function doResize(clientX, clientY) {
  if (!isResizing) return;
  const newW = Math.max(300, resizeStartW + (clientX - resizeStartX));
  const newH = Math.max(200, resizeStartH + (clientY - resizeStartY));
  galleryTab.style.width = newW + 'px';
  galleryTab.style.height = newH + 'px';
}

function endResize() {
  isResizing = false;
}

galleryResizeHandle.addEventListener('mousedown', (e) => {
  startResize(e.clientX, e.clientY);
  e.preventDefault();
  e.stopPropagation();
});

galleryResizeHandle.addEventListener('touchstart', (e) => {
  const touch = e.touches[0];
  startResize(touch.clientX, touch.clientY);
  e.preventDefault();
  e.stopPropagation();
}, { passive: false });

document.addEventListener('mousemove', (e) => {
  doResize(e.clientX, e.clientY);
});

document.addEventListener('touchmove', (e) => {
  if (!isResizing) return;
  const touch = e.touches[0];
  doResize(touch.clientX, touch.clientY);
  e.preventDefault();
}, { passive: false });

document.addEventListener('mouseup', endResize);
document.addEventListener('touchend', endResize);

document.addEventListener('click', startMusic, { once: true });
document.addEventListener('touchstart', startMusic, { once: true });
document.addEventListener('keydown', startMusic, { once: true });

window.addEventListener('DOMContentLoaded', () => {
  startMusic();
  setTimeout(() => {
    document.body.classList.add('loaded');
    container.classList.add('visible');
  }, 100);
});
</script>
</body>
</html>
