<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Time Capsule</title>
<style>
body {
  margin: 0;
  padding: 0;
  background: black;
  font-family: sans-serif;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url('images/darkwood.jpg') no-repeat center center fixed;
  background-size: cover;
  opacity: 0;
  transition: opacity 3s ease-in;
  z-index: -1;
}

body.loaded::before {
  opacity: 1;
}

#container {
  opacity: 0;
  transition: opacity 3s ease-in;
  position: relative;
  width: 100%;
  height: 100vh;
}

#container.visible {
  opacity: 1;
}

#burgerMenu {
  position: fixed;
  top: 50%;
  left: 0;
  transform: translateY(-50%);
  width: 36px;
  height: 36px;
  background: white;
  border-radius: 5px;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 3010;
}

#burgerMenuContent {
  position: fixed;
  top: 50%;
  left: -220px;
  transform: translateY(-50%);
  width: 200px;
  background: rgba(255,255,255,0.95);
  transition: left 0.3s ease;
  display: flex;
  flex-direction: column;
  padding: 20px;
  box-sizing: border-box;
  z-index: 3009;
  border-radius: 10px;
  box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
}

#burgerMenuContent.open {
  left: 10px;
}

#burgerMenuContent button {
  margin: 10px 0;
  padding: 8px;
  cursor: pointer;
  background: white;
  border: none;
  box-shadow: 0 0 5px rgba(0,0,0,0.3);
  font-size: 16px;
  transition: transform 0.1s ease;
  border-radius: 5px;
}

#burgerMenuContent button:active {
  transform: scale(0.95);
}

#muteBtn {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 2002;
  padding: 8px 12px;
  background: rgba(255,255,255,0.85);
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
  box-shadow: 2px 2px 6px rgba(0,0,0,0.5);
}

#cupboard {
  position: fixed;
  bottom: -2%;
  left: 3%;
  width: 180px;
  cursor: pointer;
  z-index: 400;
  transition: transform 0.1s ease;
}

#cupboard:active {
  transform: scale(0.97);
}

#tooltip {
  position: fixed;
  pointer-events: none;
  padding: 3px 6px;
  font-size: 16px;
  background: rgba(0,0,0,0.6);
  color: white;
  border-radius: 4px;
  opacity: 0;
  transition: opacity 0.2s ease;
  z-index: 3000;
}

#galleryOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.45);
  z-index: 2500;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

#galleryOverlay.active {
  opacity: 1;
  pointer-events: auto;
}

#galleryTab {
  position: fixed;
  width: 65vw;
  min-width: 300px;
  min-height: 200px;
  background: white;
  border-radius: 12px;
  box-shadow: 4px 4px 20px rgba(0,0,0,0.5);
  z-index: 2600;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  overflow: hidden;
  transition: opacity 0.25s ease, transform 0.25s ease;
  will-change: transform;
  transform: translateZ(0);
}

#galleryTab.visible {
  opacity: 1;
  pointer-events: auto;
}

#galleryTab.closing {
  opacity: 0 !important;
  transform: scale(0.9);
  transition: opacity 0.25s ease, transform 0.25s ease !important;
}

#galleryHeader {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  border-bottom: 1px solid #eee;
  cursor: grab;
  user-select: none;
  border-radius: 12px 12px 0 0;
  background: white;
  flex-shrink: 0;
}

#galleryHeader:active {
  cursor: grabbing;
}

#galleryTitle {
  font-family: 'Brush Script MT', cursive;
  font-style: italic;
  font-size: 22px;
  color: #333;
}

#galleryClose {
  background: none;
  border: none;
  font-size: 18px;
  cursor: pointer;
  color: #666;
  padding: 2px 6px;
  border-radius: 4px;
  transition: background 0.15s ease, transform 0.1s ease;
  box-shadow: none;
  margin: 0;
}

#galleryClose:hover {
  background: #f0f0f0;
}

#galleryClose:active {
  transform: scale(0.9);
}

#galleryContent {
  overflow-y: auto;
  padding: 16px;
  flex: 1;
  min-height: 0;
}

#galleryGridTitle {
  font-family: 'Brush Script MT', cursive;
  font-style: italic;
  font-size: 20px;
  color: #555;
  margin-bottom: 14px;
}

#galleryGrid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.gallery-item {
  position: relative;
  width: 120px;
  height: 120px;
  flex-shrink: 0;
}

.gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 6px;
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  display: block;
  will-change: transform;
}

.gallery-item:hover img {
  transform: scale(1.05);
  box-shadow: 2px 2px 8px rgba(0,0,0,0.3);
}

.gallery-download {
  position: absolute;
  bottom: 6px;
  right: 6px;
  width: 28px;
  height: 28px;
  background: rgba(255,255,255,0.6);
  border: none;
  border-radius: 5px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  opacity: 0;
  transition: opacity 0.15s ease, background 0.15s ease;
  backdrop-filter: blur(2px);
  text-decoration: none;
  color: #333;
}

.gallery-item:hover .gallery-download {
  opacity: 1;
}

.gallery-download:hover {
  background: rgba(255,255,255,0.9);
}

#galleryResizeHandle {
  position: absolute;
  bottom: 0;
  right: 0;
  width: 24px;
  height: 24px;
  cursor: nwse-resize;
  z-index: 10;
  display: flex;
  align-items: flex-end;
  justify-content: flex-end;
  padding: 4px;
  color: #bbb;
  font-size: 14px;
  user-select: none;
}

/* Image viewer */
#imageViewerOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.75);
  z-index: 4000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}

#imageViewerOverlay.active {
  opacity: 1;
  pointer-events: auto;
}

#imageViewerWrapper {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -55%);
  z-index: 4001;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
  overflow: hidden;
  max-width: 80vw;
  max-height: 70vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

#imageViewerWrapper.active {
  opacity: 1;
  pointer-events: auto;
}

#imageViewerImg {
  max-width: 80vw;
  max-height: 70vh;
  object-fit: contain;
  border-radius: 6px;
  box-shadow: 4px 4px 20px rgba(0,0,0,0.6);
  display: block;
  transition: transform 0.3s ease;
  transform-origin: center center;
  user-select: none;
  -webkit-user-drag: none;
}

#imageViewerNav {
  position: fixed;
  bottom: 8%;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 16px;
  align-items: center;
  z-index: 4002;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}

#imageViewerNav.active {
  opacity: 1;
  pointer-events: auto;
}

#imageViewerNav button {
  background: rgba(255,255,255,0.9);
  border: none;
  border-radius: 50%;
  width: 48px;
  height: 48px;
  font-size: 22px;
  cursor: pointer;
  box-shadow: 2px 2px 8px rgba(0,0,0,0.4);
  transition: transform 0.1s ease, background 0.1s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

#imageViewerNav button:hover {
  background: white;
  transform: scale(1.1);
}

#imageViewerNav button:active {
  transform: scale(0.95);
}

#imageCounter {
  color: white;
  font-size: 14px;
  background: rgba(0,0,0,0.4);
  padding: 6px 12px;
  border-radius: 20px;
  min-width: 60px;
  text-align: center;
  user-select: none;
}

#imageViewerClose {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 4003;
  background: rgba(255,255,255,0.9);
  border: none;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease, transform 0.1s ease, background 0.1s ease;
  box-shadow: 2px 2px 8px rgba(0,0,0,0.4);
  color: #333;
}

#imageViewerClose.active {
  opacity: 1;
  pointer-events: auto;
}

#imageViewerClose:hover {
  background: white;
  transform: scale(1.1);
}

#imageViewerClose:active {
  transform: scale(0.95);
}

#viewerSlideContainer {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -55%);
  z-index: 4001;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
  width: 80vw;
  height: 70vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

#viewerSlideContainer.active {
  opacity: 1;
  pointer-events: auto;
}

#imageViewerImg {
  max-width: 80vw;
  max-height: 70vh;
  object-fit: contain;
  border-radius: 6px;
  box-shadow: 4px 4px 20px rgba(0,0,0,0.6);
  display: block;
  position: absolute;
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease;
  transform-origin: center center;
  user-select: none;
  -webkit-user-drag: none;
  cursor: grab;
}

#imageViewerImg.active {
  opacity: 1;
}
</style>
</head>
<body>

<div id="container">
  <audio id="background" src="sounds/background.mp3" loop></audio>
  <audio id="background2" src="sounds/background2.mp3" loop></audio>
  <audio id="background3" src="sounds/background3.mp3" loop></audio>
  <audio id="pickup" src="sounds/pickup.mp3"></audio>
  <audio id="creakSound" src="sounds/doorcreak.mp3"></audio>

  <button id="muteBtn">Mute Music</button>

  <div id="burgerMenu">☰</div>
  <div id="burgerMenuContent">
    <div id="musicControls" style="display:flex;justify-content:center;gap:10px;">
      <button id="prevTrack">⏮</button>
      <button id="nextTrack">⏭</button>
    </div>
    <button id="portalBackBtn">🪵</button>
  </div>

 <img src="images/cupboard.png" id="cupboard">
  <div id="tooltip"></div>

  <div id="galleryOverlay"></div>
  <div id="galleryTab">
    <div id="galleryHeader">
      <span id="galleryTitle">Gallery</span>
      <button id="galleryClose">✕</button>
    </div>
    <div id="galleryContent">
      <div id="galleryGridTitle">All the art from Eleni's letters, 2025–2026</div>
      <div id="galleryGrid"></div>
    </div>
    <div id="galleryResizeHandle">⇲</div>
  </div>

  <div id="imageViewerOverlay"></div>
  <div id="viewerSlideContainer">
    <img id="imageViewerImg" src="">
  </div>
  <button id="imageViewerClose">✕</button>
  <div id="imageViewerNav">
    <button id="prevImg">←</button>
    <span id="imageCounter">1 / 30</span>
    <button id="nextImg">→</button>
  </div>

</div>

<script>
const pickupSound = document.getElementById('pickup');
const muteBtn = document.getElementById('muteBtn');
const burgerMenu = document.getElementById('burgerMenu');
const burgerContent = document.getElementById('burgerMenuContent');
const container = document.getElementById('container');
const cupboard = document.getElementById('cupboard');
const creakSound = document.getElementById('creakSound');
const galleryTab = document.getElementById('galleryTab');
const galleryOverlay = document.getElementById('galleryOverlay');
const galleryClose = document.getElementById('galleryClose');
const galleryHeader = document.getElementById('galleryHeader');
const galleryResizeHandle = document.getElementById('galleryResizeHandle');
const galleryGrid = document.getElementById('galleryGrid');
const imageViewerOverlay = document.getElementById('imageViewerOverlay');
const imageViewerImg = document.getElementById('imageViewerImg');
const imageViewerNav = document.getElementById('imageViewerNav');
const viewerSlideContainer = document.getElementById('viewerSlideContainer');
const imageCounter = document.getElementById('imageCounter');
const imageViewerClose = document.getElementById('imageViewerClose');

const musicTracks = [
  document.getElementById('background'),
  document.getElementById('background2'),
  document.getElementById('background3')
];
let currentTrack = 0;
let musicStarted = false;
musicTracks.forEach(track => { track.volume = 0.6; });
creakSound.volume = 0.6;

const galleryImages = [
  'images/Letter images/IMG_20250906_194806.jpg',
  'images/Letter images/IMG_20250907_143058~2.jpg',
  'images/Letter images/IMG_20250917_234550.jpg',
  'images/Letter images/IMG_20250918_010319~2.jpg',
  'images/Letter images/IMG_20250918_010333~3.jpg',
  'images/Letter images/IMG_20250918_151724.jpg',
  'images/Letter images/IMG_20250919_001438.jpg',
  'images/Letter images/IMG_20250919_145942~2.jpg',
  'images/Letter images/IMG_20250919_150057~2.jpg',
  'images/Letter images/IMG_20250919_150247.jpg',
  'images/Letter images/IMG_20250919_150309~2.jpg',
  'images/Letter images/IMG_20250919_150333~2.jpg',
  'images/Letter images/IMG_20250919_180559.jpg',
  'images/Letter images/IMG_20251025_182452~2.jpg',
  'images/Letter images/IMG_20251025_185734~2.jpg',
  'images/Letter images/IMG_20251025_185747~2.jpg',
  'images/Letter images/IMG_20251026_220548.jpg',
  'images/Letter images/IMG_20251026_220601.jpg',
  'images/Letter images/IMG_20251026_220631~2.jpg',
  'images/Letter images/IMG_20251026_220714~2.jpg',
  'images/Letter images/IMG_20251026_220814~2.jpg',
  'images/Letter images/IMG_20251216_011751~2.jpg',
  'images/Letter images/IMG_20251216_131924.jpg',
  'images/Letter images/IMG_20251217_231525.jpg',
  'images/Letter images/IMG_20251218_010436~2.jpg',
  'images/Letter images/IMG_20251218_161802.jpg',
  'images/Letter images/IMG_20251219_125630.jpg',
  'images/Letter images/IMG_20251219_170202~2.jpg',
  'images/Letter images/IMG_20251220_213654~2.jpg',
  'images/Letter images/Untitled119_20251025184237~2.png',
];

const galleryThumbs = [
  'images/Letter images/thumbs/Thumbs/IMG_20250906_194806.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20250907_143058~2.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20250917_234550.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20250918_010319~2.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20250918_010333~3.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20250918_151724.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20250919_001438.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20250919_145942~2.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20250919_150057~2.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20250919_150247.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20250919_150309~2.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20250919_150333~2.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20250919_180559.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20251025_182452~2.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20251025_185734~2.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20251025_185747~2.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20251026_220548.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20251026_220601.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20251026_220631~2.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20251026_220714~2.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20251026_220814~2.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20251216_011751~2.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20251216_131924.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20251217_231525.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20251218_010436~2.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20251218_161802.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20251219_125630.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20251219_170202~2.jpg',
  'images/Letter images/thumbs/Thumbs/IMG_20251220_213654~2.jpg',
  'images/Letter images/thumbs/Thumbs/Untitled119_20251025184237~2.jpg',
];

let currentImageIndex = 0;
let isViewerOpen = false;
let zoomLevel = 1;
let isAnimating = false;
let panX = 0, panY = 0;

// Populate gallery grid
galleryImages.forEach((src, i) => {
  const item = document.createElement('div');
  item.className = 'gallery-item';

  const img = document.createElement('img');
  img.loading = 'lazy';
  img.src = galleryThumbs[i];
  img.addEventListener('click', () => openImageViewer(i));
  img.addEventListener('touchend', (e) => {
    e.preventDefault();
    openImageViewer(i);
  });

  const dlBtn = document.createElement('a');
  dlBtn.className = 'gallery-download';
  dlBtn.href = src;
  dlBtn.download = src.split('/').pop();
  dlBtn.title = 'Download';
  dlBtn.textContent = '⬇';
  dlBtn.addEventListener('click', (e) => e.stopPropagation());

  item.appendChild(img);
  item.appendChild(dlBtn);
  galleryGrid.appendChild(item);
});

function updateCounter() {
  imageCounter.textContent = `${currentImageIndex + 1} / ${galleryImages.length}`;
}

function slideToImage(index, direction) {
  if (isAnimating) return;
  isAnimating = true;
  zoomLevel = 1;
  panX = 0; panY = 0;
  imageViewerImg.style.transition = 'none';
  imageViewerImg.style.transform = `translateX(0) scale(1)`;

  const outX = direction > 0 ? '-110%' : '110%';
  const inX = direction > 0 ? '110%' : '-110%';

  imageViewerImg.style.transition = 'transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease';
  imageViewerImg.style.transform = `translateX(${outX}) scale(1)`;
  imageViewerImg.style.opacity = '0';

  setTimeout(() => {
    currentImageIndex = ((index % galleryImages.length) + galleryImages.length) % galleryImages.length;
    imageViewerImg.style.transition = 'none';
    imageViewerImg.style.transform = `translateX(${inX}) scale(1)`;
    imageViewerImg.style.opacity = '0';
    imageViewerImg.src = galleryImages[currentImageIndex];
    updateCounter();

    imageViewerImg.onload = () => {
      requestAnimationFrame(() => {
        imageViewerImg.style.transition = 'transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease';
        imageViewerImg.style.transform = `translateX(0) scale(1)`;
        imageViewerImg.style.opacity = '1';
        setTimeout(() => { isAnimating = false; }, 350);
      });
    };
  }, 350);
}

function openImageViewer(index) {
  currentImageIndex = index;
  zoomLevel = 1;
  isViewerOpen = true;
  imageViewerImg.style.transition = 'none';
  imageViewerImg.style.transform = 'translateX(0) scale(1)';
  imageViewerImg.style.opacity = '0';
  imageViewerImg.src = '';
  imageViewerImg.src = galleryImages[currentImageIndex];
  imageViewerImg.onload = () => {
    imageViewerImg.style.opacity = '1';
  };
  updateCounter();
  imageViewerOverlay.classList.add('active');
  viewerSlideContainer.classList.add('active');
  imageViewerNav.classList.add('active');
  imageViewerClose.classList.add('active');
}

function closeImageViewer() {
  isViewerOpen = false;
  zoomLevel = 1;
  panX = 0; panY = 0;
  imageViewerImg.style.transform = 'translate(0px, 0px) scale(1)';
  imageViewerOverlay.classList.remove('active');
  viewerSlideContainer.classList.remove('active');
  imageViewerNav.classList.remove('active');
  imageViewerClose.classList.remove('active');
}

document.getElementById('prevImg').addEventListener('click', (e) => {
  e.stopPropagation();
  slideToImage(currentImageIndex - 1, -1);
});

document.getElementById('nextImg').addEventListener('click', (e) => {
  e.stopPropagation();
  slideToImage(currentImageIndex + 1, 1);
});

document.getElementById('prevImg').addEventListener('touchend', (e) => {
  e.preventDefault();
  e.stopPropagation();
  slideToImage(currentImageIndex - 1, -1);
});

document.getElementById('nextImg').addEventListener('touchend', (e) => {
  e.preventDefault();
  e.stopPropagation();
  slideToImage(currentImageIndex + 1, 1);
});

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (!isViewerOpen) return;
  if (e.key === 'ArrowRight') {
    slideToImage(currentImageIndex + 1, 1);
  } else if (e.key === 'ArrowLeft') {
    slideToImage(currentImageIndex - 1, -1);
  } else if (e.key === 'Escape') {
    closeImageViewer();
  }
});

// Close viewer on overlay click
imageViewerOverlay.addEventListener('click', closeImageViewer);
imageViewerClose.addEventListener('click', (e) => {
  e.stopPropagation();
  closeImageViewer();
});
imageViewerClose.addEventListener('touchend', (e) => {
  e.preventDefault();
  e.stopPropagation();
  closeImageViewer();
});
imageViewerOverlay.addEventListener('touchend', (e) => {
  e.preventDefault();
  closeImageViewer();
});

viewerSlideContainer.addEventListener('click', (e) => {
  e.stopPropagation();
});

// Zoom with trackpad/mouse wheel
let isPanning = false, panStartX = 0, panStartY = 0, panStartMouseX = 0, panStartMouseY = 0;

viewerSlideContainer.addEventListener('wheel', (e) => {
  if (!isViewerOpen) return;
  e.preventDefault();
  const delta = e.deltaY * -0.008;
  const newZoom = Math.min(Math.max(1, zoomLevel + delta), 4);
  if (newZoom === 1) { panX = 0; panY = 0; }
  zoomLevel = newZoom;
  imageViewerImg.style.transition = 'transform 0.1s ease';
  imageViewerImg.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;
}, { passive: false });

viewerSlideContainer.addEventListener('mousedown', (e) => {
  if (zoomLevel <= 1) return;
  isPanning = true;
  panStartMouseX = e.clientX;
  panStartMouseY = e.clientY;
  panStartX = panX;
  panStartY = panY;
  imageViewerImg.style.cursor = 'grabbing';
  e.preventDefault();
});

document.addEventListener('mousemove', (e) => {
  if (!isPanning) return;
  panX = panStartX + (e.clientX - panStartMouseX);
  panY = panStartY + (e.clientY - panStartMouseY);
  imageViewerImg.style.transition = 'none';
  imageViewerImg.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;
});

document.addEventListener('mouseup', () => {
  if (isPanning) {
    isPanning = false;
    imageViewerImg.style.cursor = 'grab';
  }
});

// Pinch to zoom on touchscreen
let lastPinchDist = null;
let isPinching = false;
let touchPanStartX = 0, touchPanStartY = 0, touchPanOriginX = 0, touchPanOriginY = 0;

viewerSlideContainer.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    isPinching = true;
    lastPinchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    swipeStartX = null;
    swipeStartY = null;
  } else if (e.touches.length === 1 && zoomLevel > 1) {
    touchPanStartX = e.touches[0].clientX;
    touchPanStartY = e.touches[0].clientY;
    touchPanOriginX = panX;
    touchPanOriginY = panY;
  }
}, { passive: true });

viewerSlideContainer.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2 && lastPinchDist !== null) {
    e.preventDefault();
    isPinching = true;
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    const delta = (dist - lastPinchDist) * 0.02;
    const newZoom = Math.min(Math.max(1, zoomLevel + delta), 4);
    if (newZoom === 1) { panX = 0; panY = 0; }
    zoomLevel = newZoom;
    imageViewerImg.style.transition = 'transform 0.05s ease';
    imageViewerImg.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;
    lastPinchDist = dist;
  } else if (e.touches.length === 1 && zoomLevel > 1) {
    e.preventDefault();
    panX = touchPanOriginX + (e.touches[0].clientX - touchPanStartX);
    panY = touchPanOriginY + (e.touches[0].clientY - touchPanStartY);
    imageViewerImg.style.transition = 'none';
    imageViewerImg.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;
  }
}, { passive: false });

viewerSlideContainer.addEventListener('touchend', (e) => {
  if (e.touches.length < 2) {
    lastPinchDist = null;
    setTimeout(() => { isPinching = false; }, 100);
  }
});

// Swipe to navigate
let swipeStartX = null;
let swipeStartY = null;

viewerSlideContainer.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    swipeStartX = e.touches[0].clientX;
    swipeStartY = e.touches[0].clientY;
  }
}, { passive: true });

viewerSlideContainer.addEventListener('touchend', (e) => {
  if (swipeStartX === null || e.changedTouches.length !== 1 || zoomLevel > 1 || isPinching) return;
  const dx = e.changedTouches[0].clientX - swipeStartX;
  const dy = e.changedTouches[0].clientY - swipeStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    if (dx < 0) {
      slideToImage(currentImageIndex + 1, 1);
    } else {
      slideToImage(currentImageIndex - 1, -1);
    }
  }
  swipeStartX = null;
  swipeStartY = null;
});

const tooltip = document.getElementById('tooltip');

function setupTooltip(el, text) {
  let timeout;
  el.addEventListener('mouseenter', () => {
    timeout = setTimeout(() => {
      tooltip.textContent = text;
      tooltip.style.opacity = '1';
    }, 250);
  });
  el.addEventListener('mouseleave', () => {
    clearTimeout(timeout);
    tooltip.style.opacity = '0';
  });
  el.addEventListener('mousedown', () => {
    clearTimeout(timeout);
    tooltip.style.opacity = '0';
  });
  el.addEventListener('mousemove', (e) => {
    tooltip.style.left = (e.clientX + 15) + 'px';
    tooltip.style.top = (e.clientY + 15) + 'px';
  });
}

setupTooltip(cupboard, 'It smells like perfume in here...');

function startMusic() {
  if (!musicStarted) {
    musicTracks[currentTrack].play().then(() => {
      musicStarted = true;
    }).catch(err => {
      console.log('Autoplay blocked, waiting for interaction');
    });
  }
}

function fadeOutInTrack(direction) {
  let current = musicTracks[currentTrack];
  let nextIndex = (currentTrack + direction + musicTracks.length) % musicTracks.length;
  let next = musicTracks[nextIndex];
  let fadeOut = setInterval(() => {
    if (current.volume > 0.05) {
      current.volume -= 0.05;
    } else {
      clearInterval(fadeOut);
      current.pause();
      current.currentTime = 0;
      next.volume = 0;
      next.play();
      fadeIn(next);
      currentTrack = nextIndex;
    }
  }, 50);
}

function fadeIn(track) {
  let fi = setInterval(() => {
    if (track.volume < 0.6) {
      track.volume += 0.05;
    } else {
      clearInterval(fi);
    }
  }, 50);
}

document.getElementById('nextTrack').addEventListener('click', (e) => {
  e.stopPropagation();
  startMusic();
  pickupSound.currentTime = 0;
  pickupSound.play();
  fadeOutInTrack(1);
});

document.getElementById('prevTrack').addEventListener('click', (e) => {
  e.stopPropagation();
  startMusic();
  pickupSound.currentTime = 0;
  pickupSound.play();
  fadeOutInTrack(-1);
});

muteBtn.addEventListener('click', () => {
  startMusic();
  pickupSound.currentTime = 0;
  pickupSound.play();
  musicTracks.forEach(track => track.muted = !track.muted);
  muteBtn.textContent = musicTracks[0].muted ? 'Unmute Music' : 'Mute Music';
});

burgerMenu.addEventListener('click', (e) => {
  e.stopPropagation();
  startMusic();
  pickupSound.currentTime = 0;
  pickupSound.play();
  burgerContent.classList.toggle('open');
});

burgerContent.addEventListener('click', (e) => {
  e.stopPropagation();
});

document.addEventListener('click', (e) => {
  if (!burgerMenu.contains(e.target) && !burgerContent.contains(e.target)) {
    burgerContent.classList.remove('open');
  }
});

document.getElementById('portalBackBtn').addEventListener('click', (e) => {
  e.stopPropagation();
  startMusic();
  pickupSound.currentTime = 0;
  pickupSound.play();
  burgerContent.classList.remove('open');
  window.location.href = 'capsule.html';
});

cupboard.addEventListener('click', () => {
  startMusic();
  creakSound.currentTime = 0;
  creakSound.play();
  openGallery();
});

cupboard.addEventListener('touchend', (e) => {
  e.preventDefault();
  startMusic();
  creakSound.currentTime = 0;
  creakSound.play();
  openGallery();
});

function openGallery() {
  const w = Math.min(window.innerWidth * 0.65, window.innerWidth - 40);
  const h = Math.min(window.innerHeight * 0.6, window.innerHeight - 40);
  const left = (window.innerWidth - w) / 2;
  const top = (window.innerHeight - h) / 2;
  galleryTab.style.width = w + 'px';
  galleryTab.style.height = h + 'px';
  galleryTab.style.left = left + 'px';
  galleryTab.style.top = top + 'px';
  galleryTab.style.transform = 'none';
  galleryTab.style.transition = 'none';
  galleryTab.style.opacity = '1';
  galleryTab.style.pointerEvents = 'auto';
  galleryTab.classList.add('visible');
  galleryOverlay.classList.add('active');
}

galleryClose.addEventListener('click', (e) => {
  e.stopPropagation();
  pickupSound.currentTime = 0;
  pickupSound.play();
  closeGallery();
});

galleryClose.addEventListener('touchend', (e) => {
  e.preventDefault();
  e.stopPropagation();
  pickupSound.currentTime = 0;
  pickupSound.play();
  closeGallery();
});

function closeGallery() {
  galleryTab.classList.add('closing');
  galleryOverlay.classList.remove('active');
  setTimeout(() => {
    galleryTab.classList.remove('visible');
    galleryTab.classList.remove('closing');
    galleryTab.style.opacity = '0';
    galleryTab.style.pointerEvents = 'none';
  }, 250);
}

galleryOverlay.addEventListener('click', closeGallery);
galleryOverlay.addEventListener('touchend', (e) => {
  e.preventDefault();
  closeGallery();
});

// Dragging
let dragOffsetX = 0, dragOffsetY = 0, isDraggingGallery = false;

function startGalleryDrag(clientX, clientY) {
  isDraggingGallery = true;
  const rect = galleryTab.getBoundingClientRect();
  dragOffsetX = clientX - rect.left;
  dragOffsetY = clientY - rect.top;
  galleryTab.style.transition = 'none';
}

function moveGallery(clientX, clientY) {
  if (!isDraggingGallery) return;
  galleryTab.style.left = (clientX - dragOffsetX) + 'px';
  galleryTab.style.top = (clientY - dragOffsetY) + 'px';
}

function endGalleryDrag() {
  isDraggingGallery = false;
}

galleryHeader.addEventListener('mousedown', (e) => {
  if (e.target === galleryClose) return;
  startGalleryDrag(e.clientX, e.clientY);
  e.preventDefault();
});

galleryHeader.addEventListener('touchstart', (e) => {
  if (e.target === galleryClose) return;
  const touch = e.touches[0];
  startGalleryDrag(touch.clientX, touch.clientY);
  e.preventDefault();
}, { passive: false });

document.addEventListener('mousemove', (e) => {
  moveGallery(e.clientX, e.clientY);
  doResize(e.clientX, e.clientY);
});

document.addEventListener('touchmove', (e) => {
  const touch = e.touches[0];
  if (isDraggingGallery) {
    moveGallery(touch.clientX, touch.clientY);
    e.preventDefault();
  }
  if (isResizing) {
    doResize(touch.clientX, touch.clientY);
    e.preventDefault();
  }
}, { passive: false });

document.addEventListener('mouseup', () => {
  endGalleryDrag();
  endResize();
});

document.addEventListener('touchend', () => {
  endGalleryDrag();
  endResize();
});

// Resizing
let isResizing = false;
let resizeStartX, resizeStartY, resizeStartW, resizeStartH;

function startResize(clientX, clientY) {
  isResizing = true;
  const rect = galleryTab.getBoundingClientRect();
  resizeStartX = clientX;
  resizeStartY = clientY;
  resizeStartW = rect.width;
  resizeStartH = rect.height;
  galleryTab.style.transition = 'none';
}

function doResize(clientX, clientY) {
  if (!isResizing) return;
  const newW = Math.max(300, resizeStartW + (clientX - resizeStartX));
  const newH = Math.max(200, resizeStartH + (clientY - resizeStartY));
  galleryTab.style.width = newW + 'px';
  galleryTab.style.height = newH + 'px';
}

function endResize() {
  isResizing = false;
}

galleryResizeHandle.addEventListener('mousedown', (e) => {
  startResize(e.clientX, e.clientY);
  e.preventDefault();
  e.stopPropagation();
});

galleryResizeHandle.addEventListener('touchstart', (e) => {
  const touch = e.touches[0];
  startResize(touch.clientX, touch.clientY);
  e.preventDefault();
  e.stopPropagation();
}, { passive: false });

document.addEventListener('click', startMusic, { once: true });
document.addEventListener('touchstart', startMusic, { once: true });
document.addEventListener('keydown', startMusic, { once: true });

window.addEventListener('DOMContentLoaded', () => {
  startMusic();
  setTimeout(() => {
    document.body.classList.add('loaded');
    container.classList.add('visible');
  }, 100);
});
</script>
